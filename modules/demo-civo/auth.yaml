apiVersion: v1
kind: ClusterAuth
metadata:
  name: demo-civo-auth
spec:
  methods:
    - name: default
      description: "No-op — this fake module has no real API server to authenticate into"
      auth:
        script: |
          echo "demo-civo has no real API server to authenticate into." >&2
          echo "A real Civo module would run 'civo kubernetes config <name> --save' here" >&2
          echo "to merge a working context into ~/.kube/config." >&2
