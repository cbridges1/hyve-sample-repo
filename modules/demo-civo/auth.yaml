apiVersion: v1
kind: ClusterAuth
metadata:
  name: demo-civo-auth
spec:
  methods:
    - name: default
      description: "No-op — this fake module has no real API server to authenticate into"
      auth:
        script: |
          echo "demo-civo has no real API server to authenticate into." >&2
          echo "A real Civo module would resolve \$HYVE_PARAM_CIVO_ORGANIZATION to an" >&2
          echo "org ID + API token, then run 'civo kubernetes config <name> --save --merge'" >&2
          echo "here to merge a working context into ~/.kube/config." >&2
