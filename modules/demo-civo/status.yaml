apiVersion: v1
kind: Workflow
metadata:
  name: demo-civo-status
spec:
  jobs:
    - name: status
      steps:
        - name: check-state
          # A real Civo module polls until status=ACTIVE *and* a non-empty
          # kubeconfig is returned (status can transiently be ACTIVE just
          # before the kubeconfig is ready) — our fake state file is written
          # atomically by create.yaml, so ACTIVE here always means ready.
          run: |
            if [ -f ".state/demo-civo/$HYVE_CLUSTER_NAME" ]; then
              echo "HYVE_CLUSTER_STATUS=ACTIVE"
            else
              echo "HYVE_CLUSTER_STATUS=NOT_FOUND"
            fi
