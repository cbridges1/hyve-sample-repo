apiVersion: v1
kind: Workflow
metadata:
  name: demo-civo-scale
spec:
  jobs:
    - name: scale
      steps:
        - name: update-state
          run: |
            if [ -f ".state/demo-civo/$HYVE_CLUSTER_NAME" ]; then
              echo "region=$HYVE_PARAM_REGION size=$HYVE_PARAM_NODE_SIZE count=$HYVE_PARAM_NODE_COUNT apps=$HYVE_PARAM_APPLICATIONS org=$HYVE_PARAM_CIVO_ORGANIZATION" > ".state/demo-civo/$HYVE_CLUSTER_NAME"
            fi
            echo "HYVE_MASTER_IP=10.0.1.10"
            echo "HYVE_ACCESS_PORT=6443"
            echo "HYVE_NODE_COUNT=${HYVE_PARAM_NODE_COUNT:-3}"
