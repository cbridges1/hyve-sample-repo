apiVersion: v1
kind: Workflow
metadata:
  name: demo-civo-create
spec:
  jobs:
    - name: create
      steps:
        - name: write-state
          run: |
            mkdir -p .state/demo-civo
            echo "region=$HYVE_PARAM_REGION size=$HYVE_PARAM_NODE_SIZE count=$HYVE_PARAM_NODE_COUNT" > ".state/demo-civo/$HYVE_CLUSTER_NAME"
            echo "HYVE_CLUSTER_STATUS=ACTIVE"
            echo "HYVE_ENDPOINT=https://demo-civo.local/$HYVE_CLUSTER_NAME"
            echo "HYVE_NODE_COUNT=${HYVE_PARAM_NODE_COUNT:-3}"
