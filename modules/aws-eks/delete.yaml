apiVersion: v1
kind: Workflow
metadata:
  name: delete
  description: Deprovision an Amazon EKS cluster and its managed nodegroup
spec:
  jobs:
    - name: deprovision
      steps:
        - name: check-exists
          script: |
            set -e

            result=$(aws eks describe-cluster --name "$HYVE_CLUSTER_NAME" --region "$HYVE_CLUSTER_REGION" --output json 2>/dev/null) || result=""

            if [ -z "$result" ]; then
              echo "Cluster '$HYVE_CLUSTER_NAME' not found — nothing to delete"
              exit 0
            fi

            nodegroup_name="${HYVE_CLUSTER_NAME}-ng"

            if aws eks describe-nodegroup --cluster-name "$HYVE_CLUSTER_NAME" --nodegroup-name "$nodegroup_name" --region "$HYVE_CLUSTER_REGION" > /dev/null 2>&1; then
              echo "Deleting nodegroup '$nodegroup_name'..."
              aws eks delete-nodegroup \
                --cluster-name "$HYVE_CLUSTER_NAME" \
                --nodegroup-name "$nodegroup_name" \
                --region "$HYVE_CLUSTER_REGION" > /dev/null
              aws eks wait nodegroup-deleted \
                --cluster-name "$HYVE_CLUSTER_NAME" \
                --nodegroup-name "$nodegroup_name" \
                --region "$HYVE_CLUSTER_REGION"
            fi

            echo "Deleting control plane '$HYVE_CLUSTER_NAME'..."
            aws eks delete-cluster --name "$HYVE_CLUSTER_NAME" --region "$HYVE_CLUSTER_REGION" > /dev/null
            aws eks wait cluster-deleted --name "$HYVE_CLUSTER_NAME" --region "$HYVE_CLUSTER_REGION"
