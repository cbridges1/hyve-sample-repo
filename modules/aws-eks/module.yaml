apiVersion: v1
kind: Module
metadata:
  name: aws-eks
  version: 1.0.0
  description: Amazon EKS clusters via the real AWS CLI (no eksctl dependency)
  author: hyve-sample-repo
  license: MIT
  tags:
    - aws
    - eks
    - kubernetes
spec:
  statusCacheTTL: 30s
  params:
    - name: subnet_ids
      description: Comma-separated subnet IDs for the cluster and nodegroup (at least two, in different AZs)
      required: true
    - name: eks_role_arn
      description: IAM role ARN the EKS control plane assumes
      required: true
    - name: node_role_arn
      description: IAM role ARN the managed nodegroup's EC2 instances assume
      required: true
    - name: instance_type
      description: EC2 instance type for nodegroup nodes
      default: t3.medium
      required: false
    - name: node_count
      description: Desired (and initial min/max) node count
      default: "2"
      required: false
    - name: kubernetes_version
      description: Kubernetes version — uses the AWS default if not set
      required: false
  requirements:
    env:
      - name: AWS_REGION
        description: "AWS region, e.g. us-east-1. Alternative: configure a default region via `aws configure`."
    tools:
      - name: aws
        description: "AWS CLI v2 — https://docs.aws.amazon.com/cli/"
      - name: jq
        description: "JSON processor — https://jqlang.github.io/jq/"
      - name: kubectl
        description: "Kubernetes CLI — required for auth"
