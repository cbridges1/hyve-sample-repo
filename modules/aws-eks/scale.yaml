apiVersion: v1
kind: Workflow
metadata:
  name: scale
  description: Scale an EKS managed nodegroup to a new node count
spec:
  jobs:
    - name: scale
      steps:
        - name: scale-nodegroup
          script: |
            set -e

            nodegroup_name="${HYVE_CLUSTER_NAME}-ng"
            node_count="${HYVE_PARAM_NODE_COUNT:-2}"
            max_size=$((node_count + 2))

            aws eks update-nodegroup-config \
              --cluster-name "$HYVE_CLUSTER_NAME" \
              --nodegroup-name "$nodegroup_name" \
              --region "$HYVE_CLUSTER_REGION" \
              --scaling-config "minSize=1,maxSize=${max_size},desiredSize=${node_count}" > /dev/null

            echo "HYVE_NODE_COUNT=${node_count}"
