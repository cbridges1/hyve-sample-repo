apiVersion: v1
kind: Module
metadata:
  name: demo-gke
  version: 0.1.0
  description: >-
    Fake GCP GKE-flavored module — mirrors the params a real GKE module would
    expose (project, zone, machine_type), but every operation is a plain YAML
    "Workflow" that only touches a local state file under .state/. No GCP
    credentials, no real API calls.
  author: hyve-sample-repo
  license: MIT
  tags: [demo, local, gke-flavored]
spec:
  params:
    - name: project
      description: "Fake GCP project ID (cosmetic only)"
      required: false
      default: demo-project
    - name: zone
      description: "Fake GCP zone, e.g. us-central1-a (cosmetic only)"
      required: false
      default: us-central1-a
    - name: machine_type
      description: "Fake GCE machine type, e.g. e2-medium (cosmetic only)"
      required: false
      default: e2-medium
