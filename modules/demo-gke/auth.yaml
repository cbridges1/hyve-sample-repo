apiVersion: v1
kind: ClusterAuth
metadata:
  name: demo-gke-auth
spec:
  methods:
    - name: default
      description: "No-op — this fake module has no real API server to authenticate into"
      auth:
        script: |
          echo "demo-gke has no real API server to authenticate into." >&2
          echo "A real GKE module would run 'gcloud container clusters get-credentials'" >&2
          echo "here to merge a working context into ~/.kube/config." >&2
