apiVersion: v1
kind: Workflow
metadata:
  name: demo-gke-scale
spec:
  jobs:
    - name: scale
      steps:
        - name: update-state
          run: |
            if [ -f ".state/demo-gke/$HYVE_CLUSTER_NAME" ]; then
              echo "project=$HYVE_PARAM_PROJECT zone=$HYVE_PARAM_ZONE type=$HYVE_PARAM_MACHINE_TYPE" > ".state/demo-gke/$HYVE_CLUSTER_NAME"
            fi
            echo "HYVE_MACHINE_TYPE=${HYVE_PARAM_MACHINE_TYPE:-e2-medium}"
