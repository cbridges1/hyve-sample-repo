apiVersion: v1
kind: Workflow
metadata:
  name: demo-gke-create
spec:
  jobs:
    - name: create
      steps:
        - name: write-state
          run: |
            mkdir -p .state/demo-gke
            echo "project=$HYVE_PARAM_PROJECT zone=$HYVE_PARAM_ZONE type=$HYVE_PARAM_MACHINE_TYPE" > ".state/demo-gke/$HYVE_CLUSTER_NAME"
            echo "HYVE_CLUSTER_STATUS=ACTIVE"
            echo "HYVE_ENDPOINT=https://demo-gke.local/$HYVE_CLUSTER_NAME"
            echo "HYVE_MACHINE_TYPE=${HYVE_PARAM_MACHINE_TYPE:-e2-medium}"
