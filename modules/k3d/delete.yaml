apiVersion: v1
kind: Workflow
metadata:
  name: delete
  description: Deprovision a local k3d cluster
spec:
  jobs:
    - name: deprovision
      steps:
        - name: delete-cluster
          script: |
            set -e

            exists=$(k3d cluster list -o json | jq -r --arg name "$HYVE_CLUSTER_NAME" '[.[] | select(.name==$name)] | length')

            if [ "$exists" = "0" ]; then
              echo "Cluster '$HYVE_CLUSTER_NAME' not found — nothing to delete"
              exit 0
            fi

            k3d cluster delete "$HYVE_CLUSTER_NAME"
