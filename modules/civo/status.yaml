apiVersion: v1
kind: Workflow
metadata:
  name: status
  description: Query the status of a Civo Kubernetes cluster
spec:
  jobs:
    - name: check-status
      steps:
        - name: query-cluster
          script: |
            set -e

            result=$(civo kubernetes show "$HYVE_CLUSTER_NAME" \
              --region "$HYVE_CLUSTER_REGION" \
              -o json 2>/dev/null) || result=""

            if [ -z "$result" ]; then
              echo "HYVE_CLUSTER_STATUS=NOT_FOUND"
              exit 0
            fi

            if ! printf '%s' "$result" | jq -e '.id' > /dev/null 2>&1; then
              echo "HYVE_CLUSTER_STATUS=NOT_FOUND"
              exit 0
            fi

            status=$(printf '%s' "$result" | jq -r '.status // "UNKNOWN"')

            case "$status" in
              ACTIVE)   echo "HYVE_CLUSTER_STATUS=ACTIVE" ;;
              BUILDING) echo "HYVE_CLUSTER_STATUS=CREATING" ;;
              DELETING) echo "HYVE_CLUSTER_STATUS=DELETING" ;;
              FAILED)   echo "HYVE_CLUSTER_STATUS=FAILED" ;;
              *)        echo "HYVE_CLUSTER_STATUS=NOT_FOUND" ;;
            esac
