apiVersion: v1
kind: Workflow
metadata:
  name: delete
  description: Deprovision a Civo Kubernetes cluster
spec:
  jobs:
    - name: deprovision
      steps:
        - name: check-exists
          script: |
            set -e

            result=$(civo kubernetes show "$HYVE_CLUSTER_NAME" \
              --region "$HYVE_CLUSTER_REGION" \
              -o json 2>/dev/null) || result=""

            if [ -z "$result" ]; then
              echo "Cluster '$HYVE_CLUSTER_NAME' not found — nothing to delete"
              exit 0
            fi

            civo kubernetes delete "$HYVE_CLUSTER_NAME" \
              --region "$HYVE_CLUSTER_REGION" \
              --yes
