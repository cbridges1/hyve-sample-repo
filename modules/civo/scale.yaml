apiVersion: v1
kind: Workflow
metadata:
  name: scale
  description: Scale a Civo Kubernetes cluster to a new node count
spec:
  jobs:
    - name: scale
      steps:
        - name: scale-cluster
          script: |
            set -e

            node_count="${HYVE_PARAM_NODE_COUNT:-3}"

            civo kubernetes scale "$HYVE_CLUSTER_NAME" \
              --region "$HYVE_CLUSTER_REGION" \
              --nodes "$node_count"
