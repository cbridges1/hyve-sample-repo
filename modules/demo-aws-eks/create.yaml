apiVersion: v1
kind: Workflow
metadata:
  name: demo-aws-eks-create
spec:
  jobs:
    - name: create
      steps:
        - name: write-state
          run: |
            mkdir -p .state/demo-aws-eks
            echo "vpc=$HYVE_PARAM_VPC_ID role=$HYVE_PARAM_NODE_ROLE_NAME type=$HYVE_PARAM_INSTANCE_TYPE" > ".state/demo-aws-eks/$HYVE_CLUSTER_NAME"
            echo "HYVE_CLUSTER_STATUS=ACTIVE"
            echo "HYVE_ENDPOINT=https://demo-aws-eks.local/$HYVE_CLUSTER_NAME"
            echo "HYVE_INSTANCE_TYPE=${HYVE_PARAM_INSTANCE_TYPE:-t3.medium}"
