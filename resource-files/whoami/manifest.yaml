# A tiny, single-container HTTP echo server — deliberately trivial so this
# demo has zero extra dependencies beyond what the k3d module already needs
# (kubectl, already required for auth). See templates/k3d-template.yaml's
# spec.resources and https://github.com/traefik/whoami.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  labels:
    app: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
spec:
  selector:
    app: whoami
  ports:
    - port: 80
      targetPort: 80
