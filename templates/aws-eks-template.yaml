apiVersion: v1
kind: Template
metadata:
  name: aws-eks-template
  description: >-
    Amazon EKS clusters via the real AWS CLI — requires an existing VPC with
    at least two subnets and IAM roles for the cluster and nodegroup. AWS
    credentials are read from your environment/`aws configure`.
spec:
  driver:
    source: ./modules/aws-eks
    version: 1.0.0
  region: us-east-1
  params:
    subnet_ids: "subnet-CHANGEME1,subnet-CHANGEME2"
    eks_role_arn: "arn:aws:iam::000000000000:role/CHANGEME-eks-cluster-role"
    node_role_arn: "arn:aws:iam::000000000000:role/CHANGEME-eks-node-role"
    instance_type: t3.medium
    node_count: "2"
  workflows:
    onCreate:
      - setup-demo
    onDelete:
      - cleanup-demo
