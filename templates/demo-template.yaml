apiVersion: v1
kind: Template
metadata:
    name: demo-template
    description: Reference template using the fully local demo-cluster module — safe to run with zero cloud credentials
spec:
    driver:
        source: ./modules/demo-cluster
        version: 0.1.0
    params:
        node_count: "3"
        node_size: small
    region: local-1
    workflows:
        onCreate:
            - setup-demo
        onDelete:
            - cleanup-demo
