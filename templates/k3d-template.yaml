apiVersion: v1
kind: Template
metadata:
  name: k3d-template
  description: >-
    Local k3d clusters via the real k3d CLI — no cloud credentials, just
    Docker. Works out of the box.
spec:
  driver:
    source: ./modules/k3d
    version: 1.0.0
  region: local
  params:
    agent_count: "1"
  workflows:
    onCreate:
      - setup-demo
    onDelete:
      - cleanup-demo
  # spec.resources: Kubernetes manifests/Helm releases/Secrets Hyve should
  # own, drift-check, and re-apply every reconcile — see
  # docs/concepts/resources.mdx in https://github.com/cbridges1/hyve-website.
  # A raw manifest here since this template's whole point is zero extra
  # dependencies; see civo-template.yaml for the helm: and secret: kinds.
  resources:
    - name: whoami
      source: ./resource-files/whoami/manifest.yaml
