apiVersion: v1
kind: Template
metadata:
  name: civo-template
  description: >-
    Civo Kubernetes clusters via the real Civo CLI — requires CIVO_TOKEN, and
    (for spec.resources below) helm on PATH.
spec:
  driver:
    source: ./modules/civo
    version: 1.0.0
  region: NYC1
  params:
    node_size: g4s.kube.small
    node_count: "3"
    cni_plugin: flannel
    cluster_type: k3s
  workflows:
    onCreate:
      - setup-demo
    onDelete:
      - cleanup-demo
  # spec.resources: Kubernetes manifests/Helm releases/Secrets Hyve should
  # own, drift-check, and re-apply every reconcile cycle — see
  # docs/concepts/resources.mdx in https://github.com/cbridges1/hyve-website.
  # (k3d-template.yaml shows the plain source: kind, which needs nothing
  # beyond kubectl — this template shows the other two.)
  resources:
    # helm: — installs/upgrades a chart the same way `helm upgrade --install`
    # would, drift-checked against both its declared config and the live
    # cluster on every reconcile. podinfo is a tiny, well-known demo app —
    # https://github.com/stefanprodan/podinfo.
    - name: podinfo
      helm:
        chart: podinfo
        repo: https://stefanprodan.github.io/podinfo
        version: 6.14.0
        namespace: podinfo
        values:
          replicaCount: "1"

    # secret: — renders a real v1/Secret from Hyve's own process environment
    # at reconcile time, never from anything committed to Git. Export these
    # two vars (or put them in a local .env — see .gitignore) before you
    # reconcile, or this resource fails loudly naming exactly what's missing.
    # DEMO_API_KEY is renamed to a fixed Secret key via the {env, key} form —
    # DEMO_GREETING uses the plain identity form. Neither is wired into
    # podinfo above; this is purely a standalone demo of the feature.
    - name: demo-secret
      secret:
        namespace: default
        keys:
          - DEMO_GREETING
          - env: DEMO_API_KEY
            key: api-key
