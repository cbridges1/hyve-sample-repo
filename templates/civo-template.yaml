apiVersion: v1
kind: Template
metadata:
  name: civo-template
  description: Civo Kubernetes clusters via the real Civo CLI — requires CIVO_TOKEN
spec:
  driver:
    source: ./modules/civo
    version: 1.0.0
  region: NYC1
  params:
    node_size: g4s.kube.small
    node_count: "3"
    cni_plugin: flannel
    cluster_type: k3s
  workflows:
    onCreate:
      - setup-demo
    onDelete:
      - cleanup-demo
