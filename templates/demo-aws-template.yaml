apiVersion: v1
kind: Template
metadata:
  name: demo-aws-template
  description: AWS EKS-flavored reference template using the fully local demo-aws-eks module
spec:
  driver:
    source: ./modules/demo-aws-eks
    version: 0.1.0
  region: us-east-1
  params:
    vpc_id: vpc-0demo00000000000
    node_role_name: demo-eks-node-role
    instance_type: t3.medium
  workflows:
    onCreate:
      - setup-demo
    onDelete:
      - cleanup-demo
