apiVersion: v1
kind: Cluster
metadata:
    name: demo-civo-01
    region: NYC1
spec:
    driver:
        source: ./modules/demo-civo
        version: 0.1.0
    params:
        node_count: "3"
        node_size: g4s.kube.small
        region: NYC1
    driverOutputs:
        HYVE_CLUSTER_STATUS: ACTIVE
        HYVE_ENDPOINT: https://demo-civo.local/demo-civo-01
        HYVE_LAST_PARAMS_HASH: e3835ba00a5d1b5130244a0ff52fb7a844f239ca8be5b67dd9c7cde45c52e0d1
        HYVE_NODE_COUNT: "3"
    workflows:
        onCreate:
            - setup-demo
        onDelete:
            - cleanup-demo
