apiVersion: v1
kind: Cluster
metadata:
    name: demo-aws-01
    region: us-east-1
spec:
    driver:
        source: ./modules/demo-aws-eks
        version: 0.1.0
    params:
        instance_type: t3.medium
        node_role_name: demo-eks-node-role
        vpc_id: vpc-0demo00000000000
    driverOutputs:
        HYVE_CLUSTER_STATUS: ACTIVE
        HYVE_ENDPOINT: https://demo-aws-eks.local/demo-aws-01
        HYVE_INSTANCE_TYPE: t3.medium
        HYVE_LAST_PARAMS_HASH: 3cef6e27a18fdf1fdf573050aa025d4357bb078bfcd8d99ba2ba0da12d61a598
    workflows:
        onCreate:
            - setup-demo
        onDelete:
            - cleanup-demo
