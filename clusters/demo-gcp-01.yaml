apiVersion: v1
kind: Cluster
metadata:
    name: demo-gcp-01
    region: us-central1
spec:
    driver:
        source: ./modules/demo-gke
        version: 0.1.0
    params:
        machine_type: e2-medium
        project: demo-project
        zone: us-central1-a
    workflows:
        onCreate:
            - setup-demo
        onDelete:
            - cleanup-demo
